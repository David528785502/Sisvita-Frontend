<div class="container">
    <h2>Registro de Usuario</h2>
    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" class="form-control" id="usuario" [(ngModel)]="registroObj.usuario" name="usuario" required>
      </div>
      <div class="form-group">
        <label for="contrasenna">Contraseña</label>
        <input type="password" class="form-control" id="contrasenna" [(ngModel)]="registroObj.contrasenna" name="contrasenna" required>
      </div>
      <div class="form-group">
        <label for="correo">Correo</label>
        <input type="email" class="form-control" id="correo" [(ngModel)]="registroObj.correo" name="correo" required>
      </div>
      <div class="form-group">
        <label for="numero">Número</label>
        <input type="text" class="form-control" id="numero" [(ngModel)]="registroObj.numero" name="numero" required>
      </div>
      <div class="form-group">
        <label for="fecha_nacimiento">Fecha de Nacimiento</label>
        <input type="date" class="form-control" id="fecha_nacimiento" [(ngModel)]="registroObj.fecha_nacimiento" name="fecha_nacimiento" required>
      </div>
      <div class="form-group">
        <label for="ubigeo">Ubigeo</label>
        <input type="text" class="form-control" id="ubigeo" [(ngModel)]="registroObj.ubigeo" name="ubigeo" required>
      </div>
      <button type="submit" class="btn btn-primary">Registrar</button>
    </form>
  </div>
